<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --text: #f0ede8;
    --muted: #6b6880;
    --correct: #3ecf8e;
    --wrong: #e05a2b;
    --radius: 12px;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

body::before {
content: ‘’;
position: fixed;
top: -50%; left: -50%;
width: 200%; height: 200%;
background:
radial-gradient(ellipse at 30% 20%, rgba(240,192,64,0.06) 0%, transparent 50%),
radial-gradient(ellipse at 70% 80%, rgba(224,90,43,0.05) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.container {
width: 100%;
max-width: 640px;
position: relative;
z-index: 1;
}

.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(14px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── START ── */
.start-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(72px, 15vw, 120px);
line-height: 0.9;
letter-spacing: 2px;
background: linear-gradient(135deg, var(–accent) 0%, var(–accent2) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
display: block;
margin-bottom: 10px;
}
.start-sub {
font-size: 13px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 52px;
}
.start-desc {
font-size: 16px;
color: var(–muted);
line-height: 1.6;
font-weight: 300;
margin-bottom: 44px;
}

.btn-primary {
background: var(–accent);
color: #0a0a0f;
border: none;
padding: 18px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
width: 100%;
text-align: center;
display: block;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(240,192,64,0.3); }
.btn-primary:active { transform: translateY(0); }

/* ── QUIZ ── */
.quiz-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 36px;
}
.quiz-counter {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 42px;
color: var(–accent);
line-height: 1;
}
.quiz-counter span {
font-size: 16px;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
display: block;
margin-top: 2px;
}

.question-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 20px;
padding: 32px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}
.question-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
}
.question-category {
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 14px;
opacity: 0.7;
}
.question-text {
font-size: clamp(17px, 2.6vw, 22px);
font-weight: 500;
line-height: 1.45;
}

/* ── FREE TEXT INPUT ── */
.answer-area {
margin-bottom: 14px;
}
.answer-input {
width: 100%;
background: var(–surface);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text);
padding: 18px 20px;
border-radius: var(–radius);
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
margin-bottom: 10px;
}
.answer-input:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(240,192,64,0.1);
}
.answer-input:disabled { opacity: 0.5; }
.answer-input.correct { border-color: var(–correct); box-shadow: 0 0 0 3px rgba(62,207,142,0.1); }
.answer-input.wrong   { border-color: var(–wrong);   box-shadow: 0 0 0 3px rgba(224,90,43,0.1); }

.submit-btn {
width: 100%;
background: var(–surface2);
color: var(–text);
border: 1px solid rgba(255,255,255,0.1);
padding: 16px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
}
.submit-btn:hover:not(:disabled) {
border-color: var(–accent);
background: rgba(240,192,64,0.07);
}
.submit-btn:disabled { opacity: 0.4; cursor: default; }

.feedback-bar {
background: var(–surface);
border-radius: var(–radius);
padding: 16px 20px;
margin-bottom: 12px;
display: none;
align-items: flex-start;
gap: 12px;
border-left: 4px solid transparent;
animation: slideUp 0.25s ease;
}
.feedback-bar.show { display: flex; }
.feedback-bar.correct-fb { border-left-color: var(–correct); }
.feedback-bar.wrong-fb   { border-left-color: var(–wrong); }
@keyframes slideUp {
from { opacity:0; transform:translateY(5px); }
to   { opacity:1; transform:translateY(0); }
}
.feedback-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.feedback-text { font-size: 14px; color: var(–muted); line-height: 1.5; }
.feedback-text strong { color: var(–text); display: block; margin-bottom: 2px; }

.next-btn {
width: 100%;
background: var(–accent);
color: #0a0a0f;
border: none;
padding: 17px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
display: none;
transition: transform 0.15s, box-shadow 0.15s;
}
.next-btn.show { display: block; }
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,192,64,0.25); }

/* Loading */
.loading-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 20px;
padding: 72px 36px;
text-align: center;
}
.loader { display: inline-flex; gap: 8px; margin-bottom: 20px; }
.loader-dot {
width: 10px; height: 10px;
border-radius: 50%;
background: var(–accent);
animation: bounce 1.2s infinite ease-in-out;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(–accent2); }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
0%,80%,100% { transform:scale(0.6); opacity:0.4; }
40%         { transform:scale(1); opacity:1; }
}
.loading-text { color: var(–muted); font-size: 15px; }

/* ── MODAL (done!) ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(6px);
z-index: 100;
display: none;
align-items: center;
justify-content: center;
padding: 24px;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
.modal {
background: var(–surface);
border: 1px solid rgba(240,192,64,0.2);
border-radius: 20px;
padding: 44px 36px;
max-width: 420px;
width: 100%;
text-align: center;
}
.modal-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
.modal-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 48px;
line-height: 1;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 16px;
}
.modal-body {
font-size: 16px;
color: var(–muted);
line-height: 1.7;
margin-bottom: 32px;
}
.modal-body strong { color: var(–text); }
</style>

</head>
<body>

<!-- DONE MODAL -->

<div class="modal-overlay" id="doneModal">
  <div class="modal">
    <span class="modal-emoji">🏆</span>
    <div class="modal-title">LEGENDARY</div>
    <p class="modal-body" id="doneText"></p>
    <button class="btn-primary" onclick="restartFromModal()">PLAY AGAIN</button>
  </div>
</div>

<div class="container">

  <!-- START -->

  <div class="screen active" id="startScreen">
    <span class="start-logo">QUIZ<br>MASTER</span>
    <p class="start-sub">General Knowledge · Unlimited</p>
    <p class="start-desc">4000+ questions across history, science, geography, culture and more. No repeats — ever.</p>
    <button class="btn-primary" onclick="startQuiz()">LET'S GO</button>
  </div>

  <!-- QUIZ -->

  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-counter" id="qCounter">
        1
        <span>questions answered</span>
      </div>
    </div>
    <div id="questionArea"></div>
    <div class="feedback-bar" id="feedbackBar">
      <div class="feedback-icon" id="fbIcon"></div>
      <div class="feedback-text" id="fbText"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="next()">NEXT QUESTION →</button>
  </div>

</div>

<script>
  let seenIds = new Set(JSON.parse(localStorage.getItem('qm_seen') || '[]'));

  let pool     = [];
  let poolIdx  = 0;
  let qNum     = 0;
  let answered = false;
  let correctText = '';

  // ── SCREENS ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── START ──
  async function startQuiz() {
    qNum = 0; answered = false; pool = []; poolIdx = 0;
    showScreen('quizScreen');
    try {
      await fetchPool();
      renderNext();
    } catch(e) {
      showError(e.message);
    }
  }

  // ── FETCH a batch of 50, skipping already-seen ──
  async function fetchPool() {
    showLoading('Loading questions…');

    // Try up to 3 times (OTDB sometimes returns duplicates or rate-limits)
    let attempts = 0;
    while (attempts < 3) {
      attempts++;
      let res, data;
      try {
        res  = await fetch('https://opentdb.com/api.php?amount=50&type=multiple');
        data = await res.json();
      } catch(e) {
        if (attempts >= 3) throw new Error('Could not reach the question server. Check your internet connection.');
        continue;
      }

      if (data.response_code === 5) {
        // Rate limited — wait and retry
        await sleep(1500);
        continue;
      }
      if (data.response_code !== 0 || !data.results?.length) {
        throw new Error('No questions available right now. Try again in a moment.');
      }

      const dec = s => new DOMParser().parseFromString(s, 'text/html').body.textContent;

      // Filter out already-seen questions
      const fresh = data.results.filter(q => !seenIds.has(q.question));

      if (fresh.length === 0 && seenIds.size > 3900) {
        // Seen basically everything — show done modal
        showDoneModal();
        throw new Error('ALL_DONE');
      }

      // If all 50 happened to be seen already, retry
      if (fresh.length === 0) { continue; }

      pool = fresh.map(q => {
        seenIds.add(q.question);
        return {
          category: dec(q.category),
          question: dec(q.question),
          correct_answer_raw: dec(q.correct_answer),
        };
      });

      // Persist seen IDs
      saveSeen();
      poolIdx = 0;
      return; // success
    }
    throw new Error('Could not load questions after multiple attempts. Please try again.');
  }

  function saveSeen() {
    try { localStorage.setItem('qm_seen', JSON.stringify([...seenIds])); } catch(e) {}
  }

  // ── RENDER NEXT QUESTION ──
  async function next() {
    answered = false;
    document.getElementById('feedbackBar').className = 'feedback-bar';
    document.getElementById('nextBtn').className = 'next-btn';

    if (poolIdx >= pool.length) {
      try {
        await fetchPool();
      } catch(e) {
        if (e.message !== 'ALL_DONE') showError(e.message);
        return;
      }
    }
    renderNext();
  }

  function renderNext() {
    const q = pool[poolIdx++];
    qNum++;

    correctText = q.correct_answer_raw;

    document.getElementById('qCounter').innerHTML = `${qNum}<span>questions answered</span>`;

    document.getElementById('questionArea').innerHTML = `
      <div class="question-card">
        <div class="question-category">${esc(q.category)}</div>
        <div class="question-text">${esc(q.question)}</div>
      </div>
      <div class="answer-area">
        <input
          class="answer-input"
          id="answerInput"
          type="text"
          placeholder="Type your answer…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">SUBMIT</button>
      </div>`;

    // Focus input & allow Enter to submit
    setTimeout(() => {
      const inp = document.getElementById('answerInput');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
      }
    }, 50);
  }

  // ── ANSWER ──
  function submitAnswer() {
    if (answered) return;
    const inp = document.getElementById('answerInput');
    const val = inp.value.trim();
    if (!val) return;

    answered = true;
    inp.disabled = true;
    document.getElementById('submitBtn').disabled = true;

    const ok = fuzzyMatch(val, correctText);

    inp.classList.add(ok ? 'correct' : 'wrong');

    const fb = document.getElementById('feedbackBar');
    fb.className = `feedback-bar show ${ok ? 'correct-fb' : 'wrong-fb'}`;
    document.getElementById('fbIcon').textContent = ok ? '✅' : '❌';
    document.getElementById('fbText').innerHTML   = ok
      ? `<strong>Correct!</strong>`
      : `<strong>Wrong!</strong> The correct answer was: <em>${esc(correctText)}</em>`;

    document.getElementById('nextBtn').className = 'next-btn show';
  }

  // ── FUZZY MATCH ──
  // Accept if: exact match (case-insensitive), or edit distance ≤ 2 for answers >4 chars
  function fuzzyMatch(input, correct) {
    const a = input.toLowerCase().trim();
    const b = correct.toLowerCase().trim();
    if (a === b) return true;

    // Also accept if the input matches after stripping "the ", "a ", "an "
    const strip = s => s.replace(/^(the|a|an) /i, '').trim();
    if (strip(a) === strip(b)) return true;

    // Levenshtein distance
    const dist = levenshtein(a, b);
    const maxLen = Math.max(a.length, b.length);
    // Allow 1 typo for answers up to 5 chars, 2 typos for longer
    const tolerance = maxLen <= 5 ? 1 : 2;
    return dist <= tolerance;
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  // ── DONE MODAL ──
  function showDoneModal() {
    document.getElementById('doneText').innerHTML =
      `You've answered <strong>${seenIds.size} questions</strong>.<br><br>Hit up <strong>Timon</strong> for more questions!`;
    document.getElementById('doneModal').classList.add('show');
  }

  function restartFromModal() {
    // Reset seen list so they can play again from scratch
    seenIds = new Set();
    saveSeen();
    document.getElementById('doneModal').classList.remove('show');
    startQuiz();
  }

  // ── HELPERS ──
  function showLoading(msg) {
    document.getElementById('questionArea').innerHTML = `
      <div class="loading-card">
        <div class="loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <p class="loading-text">${esc(msg)}</p>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('questionArea').innerHTML = `
      <div class="loading-card">
        <p style="color:var(--wrong);font-size:20px;margin-bottom:12px">⚠</p>
        <p class="loading-text" style="margin-bottom:24px">${esc(msg)}</p>
        <button class="btn-primary" onclick="startQuiz()">Try again</button>
      </div>`;
  }

  function shuffle(arr) {
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>

</body>
</html>

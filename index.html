<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --text: #f0ede8;
    --muted: #6b6880;
    --correct: #3ecf8e;
    --wrong: #e05a2b;
    --radius: 12px;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

body::before {
content: ‘’;
position: fixed;
top: -50%; left: -50%;
width: 200%; height: 200%;
background:
radial-gradient(ellipse at 30% 20%, rgba(240,192,64,0.06) 0%, transparent 50%),
radial-gradient(ellipse at 70% 80%, rgba(224,90,43,0.05) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.container {
width: 100%;
max-width: 640px;
position: relative;
z-index: 1;
}

.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(14px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── START ── */
.start-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(72px, 15vw, 120px);
line-height: 0.9;
letter-spacing: 2px;
background: linear-gradient(135deg, var(–accent) 0%, var(–accent2) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
display: block;
margin-bottom: 10px;
}
.start-sub {
font-size: 13px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 52px;
}
.start-desc {
font-size: 16px;
color: var(–muted);
line-height: 1.6;
font-weight: 300;
margin-bottom: 44px;
}

.btn-primary {
background: var(–accent);
color: #0a0a0f;
border: none;
padding: 18px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
width: 100%;
text-align: center;
display: block;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(240,192,64,0.3); }
.btn-primary:active { transform: translateY(0); }

/* ── QUIZ ── */
.quiz-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 36px;
}
.quiz-counter {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 42px;
color: var(–accent);
line-height: 1;
}
.quiz-counter span {
font-size: 16px;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
display: block;
margin-top: 2px;
}

.question-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 20px;
padding: 32px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}
.question-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
}
.question-category {
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 14px;
opacity: 0.7;
}
.question-text {
font-size: clamp(17px, 2.6vw, 22px);
font-weight: 500;
line-height: 1.45;
}

/* ── FREE TEXT INPUT ── */
.answer-area { margin-bottom: 14px; }
.answer-input {
width: 100%;
background: var(–surface);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text);
padding: 18px 20px;
border-radius: var(–radius);
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
margin-bottom: 10px;
}
.answer-input:focus { border-color: var(–accent); box-shadow: 0 0 0 3px rgba(240,192,64,0.1); }
.answer-input:disabled { opacity: 0.5; }
.answer-input.correct { border-color: var(–correct); box-shadow: 0 0 0 3px rgba(62,207,142,0.1); }
.answer-input.wrong   { border-color: var(–wrong);   box-shadow: 0 0 0 3px rgba(224,90,43,0.1); }

.submit-btn {
width: 100%;
background: var(–surface2);
color: var(–text);
border: 1px solid rgba(255,255,255,0.1);
padding: 16px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
}
.submit-btn:hover:not(:disabled) { border-color: var(–accent); background: rgba(240,192,64,0.07); }
.submit-btn:disabled { opacity: 0.4; cursor: default; }

.feedback-bar {
background: var(–surface);
border-radius: var(–radius);
padding: 16px 20px;
margin-bottom: 12px;
display: none;
align-items: flex-start;
gap: 12px;
border-left: 4px solid transparent;
animation: slideUp 0.25s ease;
}
.feedback-bar.show { display: flex; }
.feedback-bar.correct-fb { border-left-color: var(–correct); }
.feedback-bar.wrong-fb   { border-left-color: var(–wrong); }
@keyframes slideUp {
from { opacity:0; transform:translateY(5px); }
to   { opacity:1; transform:translateY(0); }
}
.feedback-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.feedback-text { font-size: 14px; color: var(–muted); line-height: 1.5; }
.feedback-text strong { color: var(–text); display: block; margin-bottom: 2px; }

.next-btn {
width: 100%;
background: var(–accent);
color: #0a0a0f;
border: none;
padding: 17px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 2px;
border-radius: var(–radius);
cursor: pointer;
display: none;
transition: transform 0.15s, box-shadow 0.15s;
}
.next-btn.show { display: block; }
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,192,64,0.25); }

/* Loading */
.loading-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 20px;
padding: 72px 36px;
text-align: center;
}
.loader { display: inline-flex; gap: 8px; margin-bottom: 20px; }
.loader-dot {
width: 10px; height: 10px;
border-radius: 50%;
background: var(–accent);
animation: bounce 1.2s infinite ease-in-out;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(–accent2); }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
0%,80%,100% { transform:scale(0.6); opacity:0.4; }
40%         { transform:scale(1); opacity:1; }
}
.loading-text { color: var(–muted); font-size: 15px; }
</style>

</head>
<body>
<div class="container">

  <!-- START -->

  <div class="screen active" id="startScreen">
    <span class="start-logo">QUIZ<br>MASTER</span>
    <p class="start-sub">General Knowledge · Powered by Gemini</p>
    <p class="start-desc">AI-generated questions on history, science, geography, culture and more — unique every round.</p>
    <button class="btn-primary" onclick="startQuiz()">LET'S GO</button>
  </div>

  <!-- QUIZ -->

  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-counter" id="qCounter">
        1
        <span>questions answered</span>
      </div>
    </div>
    <div id="questionArea"></div>
    <div class="feedback-bar" id="feedbackBar">
      <div class="feedback-icon" id="fbIcon"></div>
      <div class="feedback-text" id="fbText"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION →</button>
  </div>

</div>

<script>
  const GEMINI_KEY = 'AIzaSyBbTVitW_umj4MfZAog61UbDz67fVqQAbA';
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

  let qNum = 0;
  let answered = false;
  let correctText = '';
  let pool = [];
  let poolIdx = 0;
  let usedQuestions = [];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  async function startQuiz() {
    qNum = 0; answered = false; pool = []; poolIdx = 0; usedQuestions = [];
    showScreen('quizScreen');
    await loadPool();
    renderNext();
  }

  // ── FETCH 10 QUESTIONS FROM GEMINI ──
  async function loadPool() {
    showLoading('Generating questions…');

    const avoidNote = usedQuestions.length > 0
      ? `\n\nDo NOT repeat any of these questions:\n${usedQuestions.slice(-30).join('\n')}`
      : '';

    const prompt = `Generate 10 diverse general knowledge questions in English.
Topics: history, science, geography, nature, sports, culture, music, film, technology, literature, art.
Mix easy, medium and hard difficulty. Make them interesting and educational.${avoidNote}

Respond ONLY with a valid JSON array, no markdown, no explanation:
[
  {
    "category": "History",
    "question": "Which Roman emperor built a wall across northern Britain?",
    "answer": "Hadrian"
  },
  ...
]

Rules:
- answers must be short (1-4 words max)
- questions must be clear and unambiguous
- vary the topics across all 10 questions`;

    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 1.0, maxOutputTokens: 2048 }
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/gi, '').trim();
    const parsed = JSON.parse(clean);

    pool = parsed;
    parsed.forEach(q => usedQuestions.push(q.question));
    poolIdx = 0;
  }

  // ── RENDER ──
  async function nextQuestion() {
    answered = false;
    document.getElementById('feedbackBar').className = 'feedback-bar';
    document.getElementById('nextBtn').className = 'next-btn';

    if (poolIdx >= pool.length) {
      try { await loadPool(); } catch(e) { showError(e.message); return; }
    }
    renderNext();
  }

  function renderNext() {
    const q = pool[poolIdx++];
    qNum++;
    correctText = q.answer;

    document.getElementById('qCounter').innerHTML = `${qNum}<span>questions answered</span>`;

    document.getElementById('questionArea').innerHTML = `
      <div class="question-card">
        <div class="question-category">${esc(q.category)}</div>
        <div class="question-text">${esc(q.question)}</div>
      </div>
      <div class="answer-area">
        <input
          class="answer-input"
          id="answerInput"
          type="text"
          placeholder="Type your answer…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">SUBMIT</button>
      </div>`;

    setTimeout(() => {
      const inp = document.getElementById('answerInput');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
      }
    }, 50);
  }

  // ── SUBMIT ──
  function submitAnswer() {
    if (answered) return;
    const inp = document.getElementById('answerInput');
    const val = inp.value.trim();
    if (!val) return;

    answered = true;
    inp.disabled = true;
    document.getElementById('submitBtn').disabled = true;

    const ok = fuzzyMatch(val, correctText);
    inp.classList.add(ok ? 'correct' : 'wrong');

    const fb = document.getElementById('feedbackBar');
    fb.className = `feedback-bar show ${ok ? 'correct-fb' : 'wrong-fb'}`;
    document.getElementById('fbIcon').textContent = ok ? '✅' : '❌';
    document.getElementById('fbText').innerHTML = ok
      ? `<strong>Correct!</strong>`
      : `<strong>Wrong!</strong> The correct answer was: <em>${esc(correctText)}</em>`;

    document.getElementById('nextBtn').className = 'next-btn show';
  }

  // ── FUZZY MATCH ──
  function fuzzyMatch(input, correct) {
    const a = input.toLowerCase().trim();
    const b = correct.toLowerCase().trim();
    if (a === b) return true;
    const strip = s => s.replace(/^(the|a|an) /i, '').trim();
    if (strip(a) === strip(b)) return true;
    const dist = levenshtein(a, b);
    const maxLen = Math.max(a.length, b.length);
    return dist <= (maxLen <= 5 ? 1 : 2);
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  // ── HELPERS ──
  function showLoading(msg) {
    document.getElementById('questionArea').innerHTML = `
      <div class="loading-card">
        <div class="loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <p class="loading-text">${msg}</p>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('questionArea').innerHTML = `
      <div class="loading-card">
        <p style="color:var(--wrong);font-size:20px;margin-bottom:12px">⚠</p>
        <p class="loading-text" style="margin-bottom:24px">${esc(msg)}</p>
        <button class="btn-primary" onclick="nextQuestion()">Try again</button>
      </div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
